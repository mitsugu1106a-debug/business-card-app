<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <title>名刺管理アプリ</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@mui/material@5/umd/material-ui.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body { margin: 0; background-color: #f4f7f6; font-family: 'Roboto', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {
      ThemeProvider, createTheme, CssBaseline, Container, Typography, Box, Paper, TextField, Button, Grid,
      Table, TableBody, TableCell, TableContainer, TableHead, TableRow, Dialog, DialogTitle, DialogContent, DialogActions,
      Snackbar, Alert, Avatar, InputAdornment, CircularProgress, Backdrop, Checkbox, Tooltip, IconButton, Chip, Divider,
      Tabs, Tab, Accordion, AccordionSummary, AccordionDetails, Select, MenuItem, FormControl, InputLabel, Autocomplete
    } = MaterialUI;
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE_URL = '/cards/';
    const SERVER_BASE_URL = '';
    const theme = createTheme({
      palette: { primary: { main: '#1976d2' }, background: { default: '#f4f7f6', paper: '#ffffff' } },
    });

    const FIELD_LABELS = {
      name: '氏名', company_name: '会社名', department: '部署', title: '役職',
      phone_number: '電話番号', email: 'メールアドレス', address: '住所', exchange_date: '交換日', memo: 'メモ'
    };

    const App = () => {
      const [cards, setCards] = useState([]);
      const [formData, setFormData] = useState({ name: '', company_name: '', department: '', title: '', phone_number: '', email: '', address: '', exchange_date: '', memo: '' });
      const [formTags, setFormTags] = useState([]);
      const [availableTags, setAvailableTags] = useState([]);
      const [imageFile, setImageFile] = useState(null);
      const fileInputRef = useRef(null);
      const [editMode, setEditMode] = useState(false);
      const [editId, setEditId] = useState(null);
      const [openDialog, setOpenDialog] = useState(false);
      const [viewerOpen, setViewerOpen] = useState(false);
      const [viewerCard, setViewerCard] = useState(null);
      const [viewerTab, setViewerTab] = useState(0);
      const [cardHistory, setCardHistory] = useState([]);
      const [snackbar, setSnackbar] = useState({ open: false, message: '', severity: 'success' });
      const [searchInput, setSearchInput] = useState('');
      const [debouncedSearch, setDebouncedSearch] = useState('');
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [isImporting, setIsImporting] = useState(false);
      const [selectedIds, setSelectedIds] = useState([]);
      const [currentPage, setCurrentPage] = useState(1);
      const [totalPages, setTotalPages] = useState(1);
      const [totalCount, setTotalCount] = useState(0);
      const [perPage, setPerPage] = useState(50);
      const [viewMode, setViewMode] = useState('list');
      const [dupDialogOpen, setDupDialogOpen] = useState(false);
      const [dupGroups, setDupGroups] = useState([]);
      const [isDupScanning, setIsDupScanning] = useState(false);
      const [uploadingAttachment, setUploadingAttachment] = useState(false);
      const searchTimerRef = useRef(null);

      const showSnackbar = (message, severity) => setSnackbar({ open: true, message, severity });

      const fetchCards = async (page, search, pp) => {
        try {
          const res = await axios.get(API_BASE_URL, { params: { page, per_page: pp, search: search || '' } });
          setCards(res.data.items); setTotalPages(res.data.total_pages); setTotalCount(res.data.total); setCurrentPage(res.data.page);
        } catch (error) { console.error(error); }
      };

      useEffect(() => {
        const pp = viewMode !== 'list' ? 0 : perPage;
        fetchCards(viewMode !== 'list' ? 1 : currentPage, debouncedSearch, pp);
      }, [currentPage, debouncedSearch, viewMode, perPage]);

      const openImageViewer = async (card) => {
        if (!card) return;
        setViewerCard(card); setViewerTab(0); setViewerOpen(true);
        try { const res = await axios.get(`${API_BASE_URL}${card.id}/history`); setCardHistory(res.data); } catch { setCardHistory([]); }
      };

      const VirtualCardComponent = ({ card, size = 'small' }) => {
        const isSmall = size === 'small';
        const scale = isSmall ? 0.45 : 1;
        return (
          <Box sx={{ width: 360 * scale, height: 218 * scale, display: 'inline-block' }}>
            <Box sx={{
              width: 360, height: 218, backgroundColor: '#ffffff', border: '1px solid #cccccc', p: 3, position: 'relative', display: 'flex', flexDirection: 'column',
              boxShadow: '1px 2px 4px rgba(0,0,0,0.1)', cursor: isSmall ? 'pointer' : 'default', transform: `scale(${scale})`, transformOrigin: 'top left',
              fontFamily: 'serif'
            }} onClick={() => isSmall && openImageViewer(card)}>
              <Typography variant="subtitle2" sx={{ fontWeight: 'bold' }}>{card.company_name || '　'}</Typography>
              <Box sx={{ textAlign: 'center', flexGrow: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                <Typography variant="body2">{card.department} {card.title}</Typography>
                <Typography variant="h5" sx={{ fontWeight: 'bold' }}>{card.name || '名称未設定'}</Typography>
              </Box>
              <Box sx={{ mt: 'auto' }}>
                <Typography variant="caption" display="block">〒 {card.address}</Typography>
                <Typography variant="caption" display="block">TEL: {card.phone_number}</Typography>
                <Typography variant="caption" display="block">Email: {card.email}</Typography>
              </Box>
            </Box>
          </Box>
        );
      };

      const handleSearchChange = (e) => {
        setSearchInput(e.target.value);
        if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
        searchTimerRef.current = setTimeout(() => { setDebouncedSearch(e.target.value); setCurrentPage(1); }, 400);
      };

      const handleManualImport = async () => {
        setIsImporting(true);
        try {
          const res = await axios.post(`${SERVER_BASE_URL}/manual-import/`);
          showSnackbar(`${res.data.results.processed}件インポートしました`, 'success');
          fetchCards(currentPage, debouncedSearch, perPage);
        } catch (error) { showSnackbar('失敗しました', 'error'); } finally { setIsImporting(false); }
      };

      const handleAsyncUploadClick = () => document.getElementById('asyncFileInput').click();
      const handleAsyncFileChange = async (e) => {
        const files = e.target.files; if (!files.length) return;
        setIsImporting(true); const fd = new FormData(); Array.from(files).forEach(f => fd.append('images', f));
        try { await axios.post(`${SERVER_BASE_URL}/upload-async/`, fd); showSnackbar('送信完了', 'success'); } catch { showSnackbar('失敗', 'error'); } finally { setIsImporting(false); e.target.value = ''; }
      };

      const handleExportBackup = () => window.location.href = `${SERVER_BASE_URL}/export-backup/`;
      const handleImportCsvClick = () => document.getElementById('csvFileInput').click();
      const handleCsvFileChange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsImporting(true); const fd = new FormData(); fd.append('file', file);
        try { await axios.post(`${SERVER_BASE_URL}/import-csv/`, fd); showSnackbar('完了', 'success'); fetchCards(currentPage, debouncedSearch, perPage); } catch (err) { showSnackbar('エラー', 'error'); } finally { setIsImporting(false); e.target.value = ''; }
      };

      const handleOpenCreateDialog = () => {
        setFormData({ name: '', company_name: '', department: '', title: '', phone_number: '', email: '', address: '', exchange_date: '', memo: '' });
        setFormTags([]); setImageFile(null); setEditMode(false); setOpenDialog(true);
      };

      const openEditDialog = (card) => {
        setFormData({ ...card, department: card.department || '', title: card.title || '', phone_number: card.phone_number || '', email: card.email || '', address: card.address || '', exchange_date: card.exchange_date || '', memo: card.memo || '' });
        setFormTags(card.tags ? card.tags.map(t => t.name) : []); setEditMode(true); setEditId(card.id); setOpenDialog(true);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const fd = new FormData(); Object.keys(formData).forEach(k => fd.append(k, formData[k] || ''));
        fd.append('tags', formTags.join(',')); if (imageFile) fd.append('image', imageFile);
        try {
          if (editMode) await axios.put(`${API_BASE_URL}${editId}`, fd); else await axios.post(API_BASE_URL, fd);
          showSnackbar('保存しました', 'success'); fetchCards(currentPage, debouncedSearch, perPage); setOpenDialog(false);
        } catch { showSnackbar('失敗', 'error'); }
      };

      const handleDelete = async (id) => {
        if (!confirm('削除しますか？')) return;
        try { await axios.delete(`${API_BASE_URL}${id}`); showSnackbar('削除しました', 'success'); fetchCards(currentPage, debouncedSearch, perPage); } catch { showSnackbar('失敗', 'error'); }
      };

      const handleBulkDelete = async () => {
        if (!confirm(`${selectedIds.length}件削除しますか？`)) return;
        try { await axios.post(`${API_BASE_URL}bulk-delete`, { card_ids: selectedIds }); setSelectedIds([]); fetchCards(currentPage, debouncedSearch, perPage); } catch { showSnackbar('失敗', 'error'); }
      };

      const handleExportVcf = (charset, label) => {
        const form = document.createElement('form'); form.method = 'POST'; form.action = `${SERVER_BASE_URL}/export-vcard-form`;
        const ids = document.createElement('input'); ids.name = 'card_ids'; ids.value = selectedIds.join(','); form.appendChild(ids);
        const cs = document.createElement('input'); cs.name = 'charset'; cs.value = charset; form.appendChild(cs);
        document.body.appendChild(form); form.submit(); document.body.removeChild(form);
      };

      const handleExportThunderbirdCsv = () => {
        const form = document.createElement('form'); form.method = 'POST'; form.action = `${SERVER_BASE_URL}/export-thunderbird-csv-form`;
        const ids = document.createElement('input'); ids.name = 'card_ids'; ids.value = selectedIds.join(','); form.appendChild(ids);
        document.body.appendChild(form); form.submit(); document.body.removeChild(form);
      };

      const handleExportCsvSelected = () => {
        const form = document.createElement('form'); form.method = 'POST'; form.action = `${SERVER_BASE_URL}/export-csv-form`;
        const ids = document.createElement('input'); ids.name = 'card_ids'; ids.value = selectedIds.join(','); form.appendChild(ids);
        document.body.appendChild(form); form.submit(); document.body.removeChild(form);
      };

      const handleDuplicateScan = async () => {
        setDupDialogOpen(true); setIsDupScanning(true);
        try { const res = await axios.get(`${API_BASE_URL}duplicates/`); setDupGroups(res.data.duplicate_groups); } catch { } finally { setIsDupScanning(false); }
      };

      const handlePageChange = (p) => { if (p >= 1 && p <= totalPages) setCurrentPage(p); };
      const isSelected = (id) => selectedIds.includes(id);
      const handleClickSelect = (e, id) => {
        if (isSelected(id)) setSelectedIds(selectedIds.filter(i => i !== id)); else setSelectedIds([...selectedIds, id]);
      };

      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <Container maxWidth="lg" sx={{ mt: 4, mb: 4 }}>
            <Box display="flex" justifyContent="space-between" alignItems="center" mb={3} flexWrap="wrap">
              <Typography variant="h4" color="primary" fontWeight="bold">名刺管理システム</Typography>
              <Box display="flex" gap={1} flexWrap="wrap">
                <input type="file" id="asyncFileInput" multiple hidden onChange={handleAsyncFileChange} />
                <Button variant="contained" color="success" onClick={handleAsyncUploadClick} startIcon={<span className="material-icons">add_a_photo</span>}>カメラで一括アップ</Button>
                <Button variant="outlined" onClick={handleExportBackup} startIcon={<span className="material-icons">inventory_2</span>}>フルバックアップ</Button>
                <input type="file" id="csvFileInput" hidden onChange={handleCsvFileChange} />
                <Button variant="outlined" color="error" onClick={handleImportCsvClick} startIcon={<span className="material-icons">upload</span>}>CSV読込</Button>
                <Button variant="outlined" color="secondary" onClick={handleManualImport} startIcon={<span className="material-icons">sync</span>}>手動インポート</Button>
                <Button variant="contained" onClick={handleOpenCreateDialog}>手動入力/確認登録</Button>
              </Box>
            </Box>

            <Box mb={2} display="flex" gap={2} alignItems="center">
              <TextField fullWidth placeholder="検索..." value={searchInput} onChange={handleSearchChange} InputProps={{ startAdornment: <InputAdornment position="start"><span className="material-icons">search</span></InputAdornment> }} />
              <Button variant="outlined" color="warning" onClick={handleDuplicateScan} startIcon={<span className="material-icons">find_replace</span>}>重複スキャン</Button>
            </Box>

            {selectedIds.length > 0 && (
              <Paper sx={{ p: 1.5, mb: 2, bgcolor: '#e3f2fd', display: 'flex', gap: 1, alignItems: 'center' }}>
                <Chip label={`${selectedIds.length}件選択中`} color="primary" />
                <Button size="small" variant="outlined" onClick={() => handleExportVcf('utf-8-sig', '標準')}>スマホ登録</Button>
                <Button size="small" variant="outlined" onClick={() => handleExportVcf('shift_jis', 'Android')}>旧Android用</Button>
                <Button size="small" variant="outlined" onClick={handleExportThunderbirdCsv}>Thunderbird用</Button>
                <Button size="small" variant="outlined" onClick={handleExportCsvSelected}>CSV出力</Button>
                <Button size="small" variant="outlined" color="error" onClick={handleBulkDelete}>一括削除</Button>
              </Paper>
            )}

            <TableContainer component={Paper}>
              <Table>
                <TableHead sx={{ bgcolor: '#f5f5f5' }}>
                  <TableRow>
                    <TableCell padding="checkbox"><Checkbox checked={selectedIds.length === cards.length && cards.length > 0} onChange={(e) => setSelectedIds(e.target.checked ? cards.map(c => c.id) : [])} /></TableCell>
                    <TableCell>名刺</TableCell><TableCell>氏名</TableCell><TableCell>会社名</TableCell><TableCell>連絡先</TableCell><TableCell>交換日</TableCell><TableCell align="center">操作</TableCell>
                  </TableRow>
                </TableHead>
                <TableBody>
                  {cards.map(c => (
                    <TableRow key={c.id} selected={isSelected(c.id)}>
                      <TableCell padding="checkbox"><Checkbox checked={isSelected(c.id)} onChange={(e) => handleClickSelect(e, c.id)} /></TableCell>
                      <TableCell><VirtualCardComponent card={c} /></TableCell>
                      <TableCell><Typography variant="body2">{c.name}</Typography></TableCell>
                      <TableCell>{c.company_name}</TableCell>
                      <TableCell sx={{ fontSize: '0.8rem' }}>{c.phone_number}<br/>{c.email}</TableCell>
                      <TableCell>{c.exchange_date}</TableCell>
                      <TableCell align="center">
                        <Button size="small" onClick={() => openEditDialog(c)}>編集</Button>
                        <Button size="small" color="error" onClick={() => handleDelete(c.id)}>削除</Button>
                      </TableCell>
                    </TableRow>
                  ))}
                </TableBody>
              </Table>
            </TableContainer>

            <Box display="flex" justifyContent="center" mt={2} gap={2}>
              <Button disabled={currentPage === 1} onClick={() => handlePageChange(currentPage - 1)}>前へ</Button>
              <Typography>{currentPage} / {totalPages}</Typography>
              <Button disabled={currentPage === totalPages} onClick={() => handlePageChange(currentPage + 1)}>次へ</Button>
            </Box>

            <Dialog open={openDialog} onClose={() => setOpenDialog(false)} maxWidth="md" fullWidth>
              <DialogTitle>{editMode ? '編集' : '登録'}</DialogTitle>
              <form onSubmit={handleSubmit}>
                <DialogContent dividers>
                  <Grid container spacing={2}>
                    <Grid item xs={12}><Button variant="outlined" onClick={() => fileInputRef.current.click()}>画像選択</Button><input type="file" hidden ref={fileInputRef} onChange={(e) => setImageFile(e.target.files[0])} /></Grid>
                    <Grid item xs={12} sm={6}><TextField fullWidth label="氏名" value={formData.name || ''} onChange={(e) => setFormData({...formData, name: e.target.value})} /></Grid>
                    <Grid item xs={12} sm={6}><TextField fullWidth label="会社名" value={formData.company_name || ''} onChange={(e) => setFormData({...formData, company_name: e.target.value})} /></Grid>
                    <Grid item xs={12} sm={6}><TextField fullWidth label="部署" value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})} /></Grid>
                    <Grid item xs={12} sm={6}><TextField fullWidth label="役職" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} /></Grid>
                    <Grid item xs={12} sm={6}><TextField fullWidth label="電話" value={formData.phone_number} onChange={(e) => setFormData({...formData, phone_number: e.target.value})} /></Grid>
                    <Grid item xs={12} sm={6}><TextField fullWidth label="メール" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} /></Grid>
                    <Grid item xs={12}><TextField fullWidth label="住所" value={formData.address || ''} onChange={(e) => setFormData({...formData, address: e.target.value})} /></Grid>
                    <Grid item xs={12}><TextField fullWidth label="メモ" multiline rows={3} value={formData.memo || ''} onChange={(e) => setFormData({...formData, memo: e.target.value})} /></Grid>
                  </Grid>
                </DialogContent>
                <DialogActions><Button onClick={() => setOpenDialog(false)}>閉じる</Button><Button type="submit" variant="contained">保存</Button></DialogActions>
              </form>
            </Dialog>

            <Snackbar open={snackbar.open} autoHideDuration={3000} onClose={() => setSnackbar({...snackbar, open:false})}>
              <Alert severity={snackbar.severity}>{snackbar.message}</Alert>
            </Snackbar>
            <Backdrop sx={{ color: '#fff', zIndex: 3000 }} open={isAnalyzing || isImporting}><CircularProgress color="inherit" /></Backdrop>
          </Container>
        </ThemeProvider>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
